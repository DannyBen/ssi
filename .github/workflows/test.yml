name: Test
on:
  pull_request:
  push: { branches: master }

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install test dependencies
      run: sudo apt-get update && sudo apt-get install -y bats shellcheck
    - name: Run shellcheck tests
      run: shellcheck ssi
    - name: Run tests
      run: bats -r test
