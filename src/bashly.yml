name: ssi
help: Simple Script Installer
version: 0.1.8

import: src/env_vars.yml

flags:
- long: --quiet
  short: -q
  help: Suppress log output

commands:
- name: install
  alias: [i, add]
  help: Install files

  commands:
  - name: bin
    help: Install executable file

    args: &install_args
    - name: source
      help: |
        Source file. May be:
        - URL to download from
        - Path to file
        - '-' to read from stdin
      required: true

    flags:
    - &name_flag
      long: --name
      arg: name
      help: Explicit target file name (required for stdin or ambiguous sources)

  - name: man
    help: Install man page
    args:
    - name: source
      help: |
        Source file. May be:
        - URL to download from
        - Path to file
        - Path to a directory
        - '-' to read from stdin
      required: true

    flags: 
    - long: --name
      arg: name
      help: |
        Explicit target file name (required for stdin or ambiguous sources)
        Not relevant when SOURCE is a directory

  - name: completion
    help: Install completion script
    args: *install_args
    flags:
    - *name_flag
    - &shell_flag
      long: --shell
      arg: shell
      help: Shell type
      default: bash
      allowed: &shells
      - bash
      - zsh
      - fish

  - name: startup
    help: Install startup script
    args: *install_args
    flags:
    - *name_flag
    - *shell_flag
    - long: --strict
      help: Fail if the shell startup location is missing

- name: uninstall
  alias: [u, rm, remove]
  help: Uninstall files

  commands:
  - name: bin
    help: Uninstall executable file

    args: &uninstall_args
    - name: name
      help: File name to uninstall
      required: true

  - name: man
    help: Uninstall man page
    args: *uninstall_args

  - name: completion
    help: Uninstall completion script
    args: *uninstall_args
    flags:
    - *shell_flag

  - name: startup
    help: Uninstall startup script
    args: *uninstall_args
    flags:
    - *shell_flag
    - long: --strict
      help: Fail if the startup file is missing

- name: test
  alias: [t, check]
  help: Check if files are installed

  commands:
  - name: bin
    help: Check executable file

    args: &test_args
    - name: name
      help: Target file name to check
      required: true

    flags:
    - &all_flag
      long: --all
      short: -a
      help: Check all possible paths

  - name: man
    help: Check man page
    args: *test_args
    flags:
    - *all_flag

  - name: completion
    help: Check completion script
    args: *test_args
    flags:
    - *all_flag
    - *shell_flag

  - name: startup
    help: Check startup script
    args: *test_args
    flags:
    - long: --all
      short: -a
      help: Check all shell startup paths
      conflicts: [--shell]
    - long: --shell
      arg: shell
      help: Shell type
      default: bash
      allowed: *shells
      conflicts: [--all]

- name: log
  help: Send a log message
  args:
  - name: level
    help: Message log level
    required: true
    allowed: [debug, info, warn, error]
  - name: message
    help: Message to send
    required: true
    repeatable: true

- name: bootstrap
  help: Print bootstrap script
  args:
  - name: FILE
    help: |
      Write the bootstrap template to file
      If the file exists, it will only update the prepare_installer function
