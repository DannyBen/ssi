name: ssi
help: Simple Script Installer
version: 0.1.0

import: src/env_vars.yml

commands:
- name: bin
  alias: exec
  help: Install executable file

  args: &install_args
  - name: source
    help: URL to download from or '-' to read from stdin
    required: true

  flags:
  - long: --name
    arg: name
    help: Explicit target file name (required for stdin or ambiguous sources)

- name: man
  alias: doc
  help: Install man page
  args: *install_args
  flags:
  - long: --name
    arg: name
    help: Explicit target file name (required for stdin or ambiguous sources)

- name: completion
  alias: comp
  help: Install completion script
  args: *install_args
  flags:
  - long: --name
    arg: name
    help: Explicit target file name (required for stdin or ambiguous sources)
  - long: --shell
    arg: shell
    help: Shell type
    default: bash
    allowed: [bash, zsh, fish]

- name: uninstall
  alias: [u, rm, remove]
  help: Uninstall files

  commands:
  - name: bin
    alias: exec
    help: Uninstall executable file

    args: &uninstall_args
    - name: name
      help: File name to uninstall

  - name: man
    alias: doc
    help: Uninstall man page
    args: *uninstall_args

  - name: completion
    alias: comp
    help: Uninstall completion script
    args: *uninstall_args
    flags:
    - long: --shell
      arg: shell
      help: Shell type
      default: bash
      allowed: [bash, zsh, fish]
