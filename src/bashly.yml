name: ssi
help: Simple Script Installer
version: 0.1.2

import: src/env_vars.yml

commands:
- name: bin
  alias: exec
  help: Install executable file

  args: &install_args
  - name: source
    help: URL to download from, path to file, or '-' to read from stdin
    required: true

  flags:
  - &name_flag
    long: --name
    arg: name
    help: Explicit target file name (required for stdin or ambiguous sources)

- name: man
  alias: doc
  help: Install man page
  args: *install_args
  flags: 
  - *name_flag

- name: completion
  alias: comp
  help: Install completion script
  args: *install_args
  flags:
  - *name_flag
  - &shell_flag
    long: --shell
    arg: shell
    help: Shell type
    default: bash
    allowed: [bash, zsh, fish]

- name: startup
  help: Install startup script
  args: *install_args
  flags:
  - *name_flag
  - *shell_flag

- name: uninstall
  alias: [u, rm, remove]
  help: Uninstall files

  commands:
  - name: bin
    alias: exec
    help: Uninstall executable file

    args: &uninstall_args
    - name: name
      help: File name to uninstall
      required: true

  - name: man
    alias: doc
    help: Uninstall man page
    args: *uninstall_args

  - name: completion
    alias: comp
    help: Uninstall completion script
    args: *uninstall_args
    flags:
    - *shell_flag

  - name: startup
    help: Uninstall startup script
    args: *uninstall_args
    flags:
    - *shell_flag

- name: log
  help: Send a log message
  args:
  - name: level
    help: Message log level
    required: true
    allowed: [debug, info, warn, error]
  - name: message
    help: Message to send
    required: true
    repeatable: true
